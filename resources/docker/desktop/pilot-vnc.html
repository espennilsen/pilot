<!DOCTYPE html>
<!--
  Minimal noVNC client for Pilot's desktop viewer.

  Unlike the stock vnc.html, this page does NOT read the VNC password from URL
  query parameters. Instead, the parent frame sends credentials via postMessage
  after the page loads, keeping the password out of the address bar, DevTools
  Frames panel, and any URL-capturing logs.

  Protocol:
    Parent → iframe : { type: 'vnc-connect', password?: string }
    iframe → Parent : { type: 'vnc-ready' }

  Security:
    - The parent's origin is passed via the ?parentOrigin= query parameter.
    - Incoming messages are validated against that origin.
    - The vnc-ready signal targets the parent origin specifically (falls back to
      '*' for file:// / opaque origins where targeting is unreliable).
-->
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pilot Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #screen { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="screen"></div>
  <script type="module">
    import RFB from './core/rfb.js';

    // Read the expected parent origin from the URL. This is non-sensitive metadata
    // used to validate postMessage senders and target the vnc-ready signal.
    const parentOrigin = new URLSearchParams(window.location.search).get('parentOrigin');

    // For file:// origins (Electron production builds), the origin string is "null".
    // postMessage targetOrigin of "null" is unreliable for opaque origins, so fall
    // back to '*'. The vnc-ready payload carries no credentials, so this is safe.
    const targetOrigin = parentOrigin && parentOrigin !== 'null' ? parentOrigin : '*';

    let rfb = null;

    function connect(password) {
      if (rfb) {
        try { rfb.disconnect(); } catch (_) { /* already disconnected */ }
        rfb = null;
      }

      const wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${wsProto}//${window.location.host}/websockify`;

      const options = {};
      if (password) {
        options.credentials = { password };
      }

      rfb = new RFB(document.getElementById('screen'), wsUrl, options);
      rfb.scaleViewport = true;
      rfb.resizeSession = false;
    }

    window.addEventListener('message', (event) => {
      // Reject all messages when parentOrigin was not provided. Without a
      // known parent, this page was loaded directly (not via Pilot's iframe)
      // and should not accept credentials via postMessage.
      if (!parentOrigin) return;

      // Validate sender origin when a concrete (non-opaque) origin is known.
      // For file:// origins ("null") we skip the check since opaque origins
      // can't be compared reliably.
      if (parentOrigin !== 'null' && event.origin !== parentOrigin) return;

      if (event.data?.type === 'vnc-connect') {
        // Stop retrying once credentials are received.
        if (readyInterval) { clearInterval(readyInterval); readyInterval = null; }
        connect(event.data.password);
      }
    });

    // Retransmit vnc-ready on a short interval until the parent responds
    // with vnc-connect. This eliminates the timing dependency between the
    // iframe's module execution and the parent's useEffect registration —
    // if the one-shot fires before the listener is in place, subsequent
    // retries ensure the handshake completes.
    let readyRetries = 0;
    const MAX_READY_RETRIES = 15; // 30s at 2s intervals
    let readyInterval = setInterval(() => {
      if (++readyRetries >= MAX_READY_RETRIES) {
        clearInterval(readyInterval);
        readyInterval = null;
        return;
      }
      window.parent.postMessage({ type: 'vnc-ready' }, targetOrigin);
    }, 2000);
    // Send the first signal immediately (don't wait 2s).
    window.parent.postMessage({ type: 'vnc-ready' }, targetOrigin);
  </script>
</body>
</html>
